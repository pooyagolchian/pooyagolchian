name: Generate contribution snake

on:
  schedule: # roughly twice a day
    - cron: '0 */12 * * *'
  workflow_dispatch: # allow manual runs
  push:
    branches:
      - main

permissions:
  contents: write # to push the generated SVG to the output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0A0A0A&color_dots=#EBEDF0,#BDBDBD,#7D7D7D,#404040,#0A0A0A
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FFFFFF&color_dots=#161B22,#3A3A3A,#6D6D6D,#A8A8A8,#FFFFFF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
